steps:
  checks:
    image: rust:1.88
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --check
      - cargo clippy -- -D warnings
      - cargo build
    when:
      event:
        - push
        - pull_request

  integration-tests:
    image: rust:1.88
    privileged: true
    depends_on:
      - checks
    environment:
      PODMAN_USERNS: keep-id
      PODMAN_IGNORE_CGROUPSV1_WARNING: "1"
    commands:
      - |
        set -euo pipefail
        apt-get update
        apt-get install -y --no-install-recommends \
          ca-certificates \
          curl \
          podman \
          podman-compose \
          uidmap \
          slirp4netns \
          fuse-overlayfs
        rm -rf /var/lib/apt/lists/*
      - |
        set -euo pipefail
        if ! command -v just >/dev/null 2>&1; then
          cargo install just --locked
        fi
      - just test
    when:
      event:
        - push
        - pull_request

  mirror-github:
    image: alpine:3.20
    depends_on:
      - integration-tests
    environment:
      GITHUB_MIRROR_SSH_KEY:
        from_secret: github_mirror_ssh_key
    commands:
      - apk add --no-cache git openssh-client
      - mkdir -p ~/.ssh
      - printf '%s\n' "$GITHUB_MIRROR_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git remote add github git@github.com:yorunikakeru4/lazysql.git || git remote set-url github git@github.com:yorunikakeru4/lazysql.git
      - git fetch origin '+refs/heads/*:refs/remotes/origin/*' --tags
      - |
        set -euo pipefail
        for branch in $(git for-each-ref --format='%(refname:strip=3)' refs/remotes/origin); do
          [ "$branch" = "HEAD" ] && continue
          git push github "refs/remotes/origin/$branch:refs/heads/$branch"
        done
      - git push github --tags
    when:
      event:
        - push
      branch:
        - main
