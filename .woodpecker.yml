steps:
  checks:
    image: rust:1.88
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --check
      - cargo clippy -- -D warnings
      - cargo build
    when:
      event:
        - push
        - pull_request

  integration-tests:
    image: rust:1.88
    depends_on:
      - checks
    environment:
      TEST_DB_HOST: postgres
      TEST_DB_PORT: "5432"
      TEST_DB_USER: test_user
      TEST_DB_NAME: db_test
      TEST_DB_PASSWORD: vBnA46MVSs
      PGPASSWORD: vBnA46MVSs
      TEST_MYSQL_HOST: mysql
      TEST_MYSQL_PORT: "3306"
      TEST_MYSQL_USER: test_user
      TEST_MYSQL_DB: db_test
      TEST_MYSQL_PASSWORD: xK9mP2wQr7
    commands:
      - |
        set -eu
        apt-get update
        apt-get install -y --no-install-recommends \
          postgresql-client \
          default-mysql-client
        rm -rf /var/lib/apt/lists/*
      - until pg_isready -h postgres -p 5432 -U test_user -d db_test; do sleep 1; done
      - until mysqladmin ping -h mysql -u test_user -pxK9mP2wQr7 --silent; do sleep 1; done
      - psql -h postgres -p 5432 -U test_user -d db_test -f init/postgres.sql
      - mysql -h mysql -u root -prootSecret42 db_test < init/mysql.sql
      - cargo test -v
    when:
      event:
        - push
        - pull_request

  mirror-github:
    image: alpine:3.20
    depends_on:
      - integration-tests
    environment:
      GITHUB_MIRROR_SSH_KEY:
        from_secret: Lazysql
    commands:
      - apk add --no-cache git openssh-client
      - mkdir -p ~/.ssh
      - printf '%s\n' "$GITHUB_MIRROR_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan github.com >> ~/.ssh/known_hosts
      - git remote add github git@github.com:yorunikakeru4/lazysql.git || git remote set-url github git@github.com:yorunikakeru4/lazysql.git
      - git fetch --unshallow origin '+refs/heads/*:refs/remotes/origin/*' --tags || git fetch origin '+refs/heads/*:refs/remotes/origin/*' --tags
      - git push --force github refs/remotes/origin/main:refs/heads/main
      - git push github --tags
    when:
      event:
        - push
      branch:
        - main

services:
  - name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: vBnA46MVSs
      POSTGRES_DB: db_test

  - name: mysql
    image: mysql:8.0
    environment:
      MYSQL_USER: test_user
      MYSQL_PASSWORD: xK9mP2wQr7
      MYSQL_DATABASE: db_test
      MYSQL_ROOT_PASSWORD: rootSecret42
